name: Build

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  windows-qt:
    name: Windows Qt 5 CMake
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 5.15.2
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtserialport
          cache: true

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release
